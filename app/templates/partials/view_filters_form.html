{% if scan and analysis_id %}
<form
  id="results-view-filters"
  class="view-filters-bar"
  method="post"
  action="/results/{{ analysis_id }}/view-prefs"
  aria-labelledby="view-filters-title"
>
  <div>
    <h3 id="view-filters-title" class="section-title">Filtros de vista</h3>
    <p class="section-copy" style="margin-bottom: 0;">
      Ajusta el listado sin volver a ejecutar Bandit ni Semgrep.
    </p>
  </div>
  <div class="option-list view-filters-options">
    <label class="toggle">
      <input type="checkbox" name="hide_info" value="true" {% if hide_info %}checked{% endif %} />
      <span>
        <strong>Ocultar informativos / baja severidad</strong>
      </span>
    </label>
    <label class="toggle">
      <input
        type="checkbox"
        name="group_equivalent"
        value="true"
        {% if group_equivalent %}checked{% endif %}
      />
      <span>
        <strong>Agrupar equivalentes</strong>
      </span>
    </label>
  </div>
  <button class="button button--secondary button--compact" type="submit">
    Aplicar filtros
  </button>
</form>
{% endif %}
